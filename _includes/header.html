<header class="header" role="banner">
  <div class="header-inner">

    <!-- LOGO + TITLE -->
    <div class="alumni-efw">
    <a class="logo" rel="author" href="{{ "/" | relative_url }}">
      <img src="{{ "/assets/images/logo.jpg" | relative_url }}"
           alt="EFW Alumni Community Logo"
           class="site-logo"
        >
      <div class="site-title">
        {{ site.title }}
      </div>
    </a>
    </div>

    <!-- Navigation -->
    <nav class="site-nav" id="siteNav">
        <ul class="nav-menu">
            {% assign sorted_pages = site.pages | where: "nav", true | sort: "order" %}
            {% for page in sorted_pages %}
                {% if page.title %}
                <li><a class="page-link" href="{{ page.url | relative_url }}">
                    {{ page.title }}
                </a></li>
                {% endif %}
            {% endfor %}
        </ul>
    </nav>

    <!-- Mobile Menu Button -->
    <div class="menu-toggle" id="menuToggle">
        ☰
    </div>
  </div>
</header>
