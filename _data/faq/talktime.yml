title: Talk Time

items:
  - question: Who can join Talk Time?
    answer: Talk Time is for members of the English for Work Alumni Community. If you are an English for Work graduate and would like to join Alumni, please start with the [Ways to Connect](/ways-to-connect/) page.
    highlighted: true

  - question: How do I get the Zoom link?
    answer: The Zoom link is shared through Alumni Community channels. Join WhatsApp or LinkedIn to receive updates and the weekly Talk Time announcement.
    highlighted: true

  - question: Do I need to attend every week?
    answer: No. You can join when you have time. Talk Time is a resource you can return to whenever it is useful for you.
    highlighted: false

  - question: Do I need perfect English?
    answer: No. Talk Time is a place to practice, not a place to be perfect. Mistakes are a normal part of learning and speaking.

  - question: Is Talk Time the same as English for Work class??
    answer: No. No. Talk Time is not a formal class. It is a friendly conversation practice session with other Alumni members.
