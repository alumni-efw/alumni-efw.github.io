title: Get Involved

items:
  - question: Is this a paid role?
    answer: No. These are unpaid volunteer opportunities for Alumni members. They can still be valuable experience for your résumé, LinkedIn profile, and future interviews.
    highlighted: true

  - question: Can I help only once?
    answer: Yes. Some opportunities can be one-time, such as facilitating one session, sharing one story, suggesting one topic, or helping with one small task.

  - question: Do I need previous volunteer experience?
    answer: No. Previous experience can be helpful, but it is not always required. For many roles, the most important things are interest, communication, reliability, and willingness to learn.
    highlighted: true
